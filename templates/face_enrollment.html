<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Enrollment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        #video-container {
            position: relative;
            width: 320px;
            height: 240px;
            margin: 1rem auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--accent-primary);
        }
        #video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: 120%; /* Zoom in slightly */
            transform: translate(-50%, -50%) scaleX(-1); /* Flip horizontally */
        }
        #status-message {
            font-weight: 600;
            min-height: 2rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card text-center">
            <h2 style="color: var(--accent-primary);">Secure Biometric Setup</h2>
            <p style="color: var(--text-secondary);">Welcome, {{ user.name }}! Please enroll your face to continue. This is a one-time process.</p>
            
            <div id="video-container">
                <video id="video" autoplay muted playsinline></video>
            </div>
            
            <p id="status-message" style="color: var(--accent-primary);">Please allow camera access...</p>
            
            <button id="enroll-button" style="display: none;">Capture & Enroll My Face</button>

        </div>
    </div>

    <!-- Load the face-api.js library -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <!-- We will use the student.js file to handle the logic for this page -->
    <script src="{{ url_for('static', filename='js/student.js') }}"></script>
</body>
</html>
