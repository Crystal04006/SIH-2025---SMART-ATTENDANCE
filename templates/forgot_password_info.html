<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        // This script applies the theme instantly to prevent a flash of the wrong theme.
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode-html');
        }
    </script>
    <style>
        .light-mode-html {
            --bg-start: #FDFEFE;
            --bg-end: #F8F9FA;
        }
    </style>
</head>
<body class="{{ 'light-mode' if savedTheme == 'light' else '' }}">
    <div class="auth-container">
        <div class="card auth-card">
            <h2 style="text-align: center; color: var(--accent-primary);">Password Reset</h2>
            <p style="text-align: center; color: var(--text-secondary);">
                To reset your password, please contact the Administrator of your institution directly.
            </p>
            <p style="text-align: center; margin-top: 2rem;">
                <a href="{{ url_for('login') }}">&larr; Back to Login</a>
            </p>
        </div>
    </div>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
